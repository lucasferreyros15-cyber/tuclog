<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e8eaf0;font-family:Inter,-apple-system,sans-serif;font-size:14px}
input,select,button,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#2e3248;border-radius:3px}
.wrap{display:flex;min-height:100vh}
.sidebar{width:210px;background:#1a1d27;border-right:1px solid #2a2d3e;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.logo{padding:22px 18px 14px;border-bottom:1px solid #2a2d3e}
.logo h1{font-size:17px;font-weight:900;letter-spacing:-.02em}
.logo p{font-size:10px;color:#6b7280;margin-top:2px;letter-spacing:.08em}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 18px;color:#6b7280;background:transparent;border:none;border-left:3px solid transparent;cursor:pointer;width:100%;text-align:left;font-size:13px;transition:all .15s}
.nav-btn.active{color:#e8eaf0;background:#6c72ff22;border-left-color:#6c72ff}
.nav-btn:hover{color:#9ca3af;background:#ffffff08}
.main{flex:1;padding:24px;overflow-y:auto;max-width:1050px}
.card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:10px;padding:18px;margin-bottom:14px}
.stat{background:#1a1d27;border:1px solid #2a2d3e;border-radius:8px;padding:14px 16px}
.stat .n{font-size:22px;font-weight:800;line-height:1}
.stat .l{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.mb{margin-bottom:14px}
input[type=text],input[type=number],input[type=date],input[type=password],select{background:#0f1117;border:1px solid #2a2d3e;color:#e8eaf0;padding:8px 10px;border-radius:7px;font-size:13px;width:100%;outline:none}
label{font-size:11px;color:#6b7280;display:block;margin-bottom:3px;font-weight:500}
.btn{padding:9px 18px;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-sm{padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;border:none}
.btn-out{padding:8px 14px;background:transparent;border:1px solid #2a2d3e;color:#6b7280;border-radius:7px;cursor:pointer;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;color:#6b7280;font-size:10px;border-bottom:1px solid #2a2d3e;text-transform:uppercase;font-weight:600}
td{padding:9px 10px;border-bottom:1px solid #2a2d3e22}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.alert{border-radius:7px;padding:10px 14px;margin-bottom:12px;font-size:12px}
.modal-bg{position:fixed;inset:0;background:#000b;display:flex;align-items:center;justify-content:center;z-index:100}
.modal-box{background:#1a1d27;border:1px solid #2a2d3e;border-radius:12px;padding:24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:13px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f1117}
.login-box{background:#1a1d27;border:1px solid #2a2d3e;border-radius:12px;padding:36px;width:340px}
.progress{height:7px;background:#2a2d3e;border-radius:4px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a2d3e22;font-size:13px}
.sidebar-footer{padding:14px 18px;border-top:1px solid #2a2d3e;margin-top:auto}
@media(max-width:600px){.sidebar{width:56px}.sidebar .nav-label{display:none}.logo p,.logo h1{display:none}.main{padding:14px}.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="app"><div class="loading">Conectando con Tuclog...</div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,addDoc,onSnapshot,doc,setDoc,deleteDoc,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyAfA1g4_t9VMqaAGOHj4FJIY40vuqZjR5M",authDomain:"tuclog-20d44.firebaseapp.com",projectId:"tuclog-20d44",storageBucket:"tuclog-20d44.firebasestorage.app",messagingSenderId:"153541797123",appId:"1:153541797123:web:14bb597d29966c2d537536"});
const db=getFirestore(app);
window.DB={db,collection,addDoc,onSnapshot,doc,setDoc,deleteDoc,query,orderBy};

<script>
// HELPERS
const $p=function(n){return "$"+Number(n||0).toLocaleString("es-AR");};
const today=function(){return new Date().toISOString().slice(0,10);};
const mesActual=function(){return today().slice(0,7);};
const mesLabel=function(m){if(!m)return"";var p=m.split("-");return["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][parseInt(p[1])-1]+" "+p[0];};
const semKey=function(f){var d=new Date(f+"T12:00:00");var l=new Date(d);l.setDate(d.getDate()-d.getDay()+1);return l.toISOString().slice(0,10);};
const semLabel=function(f){var l=new Date(f+"T12:00:00");var v=new Date(l);v.setDate(l.getDate()+4);return l.getDate()+"/"+(l.getMonth()+1)+" al "+v.getDate()+"/"+(v.getMonth()+1);};
const meses12=function(){var s=new Set([mesActual()]);for(var i=1;i<=12;i++){var d=new Date();d.setMonth(d.getMonth()-i);s.add(d.toISOString().slice(0,7));}return Array.from(s).sort().reverse();};

// DOM HELPERS
function el(tag,cls,content,attrs){
  var e=document.createElement(tag);
  if(cls)e.className=cls;
  if(attrs){
    for(var k in attrs){
      if(k==="style"&&typeof attrs[k]==="object"){Object.assign(e.style,attrs[k]);}
      else if(k==="onClick"){e.addEventListener("click",attrs[k]);}
      else{e.setAttribute(k,attrs[k]);}
    }
  }
  if(content!=null){
    if(typeof content==="string"){e.textContent=content;}
    else if(Array.isArray(content)){content.forEach(function(c){if(c!=null)e.appendChild(typeof c==="string"?document.createTextNode(c):c);});}
    else if(content instanceof Element){e.appendChild(content);}
  }
  return e;
}
function btn(text,color,onClick){
  var b=el("button","btn",text);
  b.style.background=color||"#6c72ff";b.style.color="#fff";
  b.addEventListener("click",onClick);
  return b;
}
function btnSm(text,color,onClick){
  var b=el("button","btn-sm",text);
  b.style.background=(color||"#6c72ff")+"22";b.style.border="1px solid "+(color||"#6c72ff")+"55";b.style.color=color||"#6c72ff";b.style.cursor="pointer";
  b.addEventListener("click",onClick);
  return b;
}
function tag(text,color){return el("span","tag",text,{style:{background:color+"22",color:color}});}
function statCard(num,label,color){
  var c=el("div","stat mb");
  c.style.borderTop="3px solid "+(color||"#6c72ff");
  var n=el("div","n",num);n.style.color=color||"#6c72ff";
  c.appendChild(n);c.appendChild(el("div","l",label));
  return c;
}
function rowEl(left,right,rightColor){
  var r=el("div","row");
  r.appendChild(typeof left==="string"?el("span","",left):left);
  var rv=el("span","",right);rv.style.fontWeight="700";rv.style.color=rightColor||"#e8eaf0";
  r.appendChild(rv);
  return r;
}
function mkInput(label,type,value,placeholder){
  var w=el("div","mb");
  w.appendChild(el("label","",label));
  var i=document.createElement("input");
  i.type=type||"text";i.value=value||"";i.placeholder=placeholder||"";
  w.appendChild(i);
  return {wrap:w,input:i};
}
function mkSelect(label,options,value){
  var w=el("div","mb");
  w.appendChild(el("label","",label));
  var s=document.createElement("select");
  options.forEach(function(opt){
    var o=document.createElement("option");o.value=opt[0];o.textContent=opt[1]||opt[0];
    if(opt[0]===value)o.selected=true;
    s.appendChild(o);
  });
  w.appendChild(s);
  return {wrap:w,select:s};
}

// MODAL
function modal(title,buildFn,onSave,color){
  var bg=el("div","modal-bg");
  var box=el("div","modal-box");
  var hdr=el("div","",undefined,{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"18px"}});
  hdr.appendChild(el("span","",title,{style:{fontSize:"15px",fontWeight:"700"}}));
  var closeBtn=el("button","","✕",{style:{background:"none",border:"none",color:"#6b7280",fontSize:"20px",cursor:"pointer"}});
  closeBtn.addEventListener("click",function(){bg.remove();});
  hdr.appendChild(closeBtn);
  box.appendChild(hdr);
  var body=el("div","mb");box.appendChild(body);
  var footer=el("div","",undefined,{style:{display:"flex",gap:"10px",justifyContent:"flex-end",marginTop:"8px"}});
  var cancelBtn=el("button","btn-out","Cancelar");cancelBtn.addEventListener("click",function(){bg.remove();});
  footer.appendChild(cancelBtn);
  var saveBtn=btn("Guardar",color||"#6c72ff",function(){
    saveBtn.disabled=true;saveBtn.textContent="Guardando...";
    onSave(box,function(){bg.remove();}).then(function(){}).catch(function(){saveBtn.disabled=false;saveBtn.textContent="Guardar";});
  });
  footer.appendChild(saveBtn);
  box.appendChild(footer);
  bg.appendChild(box);
  document.body.appendChild(bg);
  bg.addEventListener("click",function(e){if(e.target===bg)bg.remove();});
  buildFn(body);
}

// FIREBASE STORE
var COLS={};
var LISTENERS={};
function getData(col){return COLS[col]||[];}
function onData(col,fn){if(!LISTENERS[col])LISTENERS[col]=[];LISTENERS[col].push(fn);if(COLS[col])fn(COLS[col]);}
function notify(col){(LISTENERS[col]||[]).forEach(function(fn){fn(COLS[col]);});}
var READY={};
var REQUIRED=["mov2","gas2","suel2","semanas","hojaldre","viajes","plumas"];
function checkReady(){
  REQUIRED.forEach(function(col){if(COLS[col])READY[col]=true;});
  if(Object.keys(READY).length>=REQUIRED.length){showLogin();}
}
// Timeout de 5 segundos
setTimeout(function(){
  REQUIRED.forEach(function(col){if(!COLS[col])COLS[col]=[];READY[col]=true;});
  showLogin();
},5000);

function initCol(name){
  var ref=window.DB.collection(window.DB.db,name);
  window.DB.onSnapshot(ref,function(snap){
    COLS[name]=snap.docs.map(function(d){var o=d.data();o._id=d.id;return o;});
    notify(name);
    checkReady();
    if(currentUser)render();
  });
}
function addDoc2(col,data){return window.DB.addDoc(window.DB.collection(window.DB.db,col),data);}
function updDoc(col,id,data){return window.DB.setDoc(window.DB.doc(window.DB.db,col,id),data);}
function delDoc(col,id){return window.DB.deleteDoc(window.DB.doc(window.DB.db,col,id));}

// AUTH
var USERS=[
  {id:"lucas",nombre:"Lucas",pass:"1927",verHojaldre:true},
  {id:"cesar",nombre:"César",pass:"cesar2024",verHojaldre:false},
];
var currentUser=null;
var currentTab="inicio";

// LOGIN
function showLogin(){
  if(currentUser){render();return;}
  var app=document.getElementById("app");
  app.innerHTML="";
  var wrap=el("div","login-wrap");
  var box=el("div","login-box");
  box.appendChild(el("h1","","Tuclog",{style:{fontSize:"22px",fontWeight:"900",marginBottom:"4px"}}));
  box.appendChild(el("p","","PANEL DE GESTIÓN",{style:{fontSize:"11px",color:"#6b7280",marginBottom:"24px"}}));
  var uLabel=el("label","","Usuario");
  var uSel=document.createElement("select");
  uSel.style.cssText="background:#0f1117;border:1px solid #2a2d3e;color:#e8eaf0;padding:8px 10px;border-radius:7px;font-size:13px;width:100%;margin-bottom:12px;margin-top:3px";
  var opts=[["","— seleccioná —"]].concat(USERS.map(function(u){return[u.id,u.nombre];}));
  opts.forEach(function(opt){var o=document.createElement("option");o.value=opt[0];o.textContent=opt[1];uSel.appendChild(o);});
  var pLabel=el("label","","Contraseña",{style:{marginTop:"8px"}});
  var pInp=document.createElement("input");pInp.type="password";pInp.placeholder="••••••••";
  pInp.style.cssText="background:#0f1117;border:1px solid #2a2d3e;color:#e8eaf0;padding:8px 10px;border-radius:7px;font-size:13px;width:100%;margin-bottom:14px;margin-top:3px";
  var errDiv=el("div","","",{style:{fontSize:"12px",color:"#ef4444",marginBottom:"8px",display:"none"}});
  var loginBtn=btn("Ingresar","#6c72ff",function(){
    var u=USERS.find(function(x){return x.id===uSel.value&&x.pass===pInp.value;});
    if(u){currentUser=u;render();}
    else{errDiv.textContent="Usuario o contraseña incorrectos";errDiv.style.display="block";}
  });
  loginBtn.style.width="100%";loginBtn.style.marginTop="4px";
  pInp.addEventListener("keydown",function(e){if(e.key==="Enter")loginBtn.click();});
  box.appendChild(uLabel);box.appendChild(uSel);
  box.appendChild(pLabel);box.appendChild(pInp);
  box.appendChild(errDiv);box.appendChild(loginBtn);
  wrap.appendChild(box);app.appendChild(wrap);
}

// MAIN LAYOUT
function render(){
  if(!currentUser){showLogin();return;}
  var app=document.getElementById("app");app.innerHTML="";
  var wrap=el("div","wrap");
  // Sidebar
  var sb=el("div","sidebar");
  sb.appendChild(el("div","logo",[el("h1","","Tuclog"),el("p","","PANEL DE GESTIÓN")]));
  var navDiv=el("div","",undefined,{style:{flex:"1",padding:"8px 0",overflowY:"auto"}});
  var NAV=[["inicio","🏠","Inicio"],["sueldos","💼","Sueldos"],["caja","🏦","Caja"],["ingresos","💰","Ingresos"],["gastos","📉","Gastos"],["resumen","📊","Resumen"],["viajes","🚛","Viajes"],["plumas","🔵","Plumas"]];
  if(currentUser.verHojaldre)NAV.push(["hojaldre","🟠","Hojaldre"]);
  NAV.forEach(function(n){
    var b=el("button","nav-btn"+(currentTab===n[0]?" active":""));
    b.appendChild(el("span","",n[1]));b.appendChild(el("span","nav-label",n[2]));
    b.addEventListener("click",function(){currentTab=n[0];render();});
    navDiv.appendChild(b);
  });
  sb.appendChild(navDiv);
  var footer=el("div","sidebar-footer");
  footer.appendChild(el("div","",currentUser.nombre,{style:{fontSize:"12px",fontWeight:"600",marginBottom:"6px"}}));
  footer.appendChild(btnSm("Salir","#ef4444",function(){currentUser=null;currentTab="inicio";showLogin();}));
  sb.appendChild(footer);
  wrap.appendChild(sb);
  // Main
  var main=el("div","main");
  if(currentTab==="inicio")pageInicio(main);
  else if(currentTab==="sueldos")pageSueldos(main);
  else if(currentTab==="caja")pageCaja(main);
  else if(currentTab==="ingresos")pageIngresos(main);
  else if(currentTab==="gastos")pageGastos(main);
  else if(currentTab==="resumen")pageResumen(main);
  else if(currentTab==="viajes")pageViajes(main);
  else if(currentTab==="plumas")pagePlumas(main);
  else if(currentTab==="hojaldre"&&currentUser.verHojaldre)pageHojaldre(main);
  wrap.appendChild(main);app.appendChild(wrap);
}

// COLORES CLIENTES
var CC={Plumas:"#38bdf8",Mendovet:"#22c55e",Hojaldre:"#fb923c"};

// ── INICIO ────────────────────────────────────────────────────────────
function pageInicio(main){
  var movs=getData("mov2");var gastos=getData("gas2");var suel=getData("suel2");var semanas=getData("semanas");
  var mesSel=mesActual();
  var allMes=Array.from(new Set([mesActual()].concat(movs.map(function(m){return m.fecha.slice(0,7);}).concat(gastos.map(function(g){return g.fecha.slice(0,7);}).concat(suel.map(function(s){return s.fecha.slice(0,7);}))))));
  allMes.sort().reverse();

  function build(){
    main.innerHTML="";
    var hdr=el("div","",undefined,{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}});
    hdr.appendChild(el("h2","","Estado general",{style:{fontSize:"18px",fontWeight:"800"}}));
    var mSel=document.createElement("select");
    mSel.style.cssText="background:#0f1117;border:1px solid #2a2d3e;color:#e8eaf0;padding:7px 10px;border-radius:7px;font-size:12px;width:155px";
    allMes.forEach(function(m){var o=document.createElement("option");o.value=m;o.textContent=mesLabel(m);if(m===mesSel)o.selected=true;mSel.appendChild(o);});
    mSel.addEventListener("change",function(e){mesSel=e.target.value;build();});
    hdr.appendChild(mSel);main.appendChild(hdr);
    main.appendChild(el("p","",""+mesLabel(mesSel),{style:{fontSize:"12px",color:"#6b7280",marginBottom:"16px"}}));

    var ingMes=movs.filter(function(m){return m.tipo==="ingreso"&&m.fecha.startsWith(mesSel)&&["Plumas","Mendovet"].includes(m.cliente);});
    var gasMes=gastos.filter(function(g){return g.fecha.startsWith(mesSel);});
    var suelMes=suel.filter(function(s){return s.fecha.startsWith(mesSel);});
    var semMes=semanas.filter(function(s){return s.fecha&&s.fecha.startsWith(mesSel);});
    var totalIng=ingMes.reduce(function(s,m){return s+m.monto;},0);
    var totalGas=gasMes.reduce(function(s,g){return s+g.monto;},0)+suelMes.reduce(function(s,x){return s+x.monto;},0);
    var resultado=totalIng-totalGas;
    var SUELDO_C=1500000;
    var lucasLlevo=semMes.reduce(function(s,x){return s+x.resultadoLucas;},0);
    var cesarLlevo=semMes.reduce(function(s,x){return s+x.resultadoCesar;},0);
    var quedaEmpresa=resultado-lucasLlevo-Math.min(cesarLlevo,SUELDO_C);
    var sem=semKey(today());
    var ingSem=movs.filter(function(m){return m.tipo==="ingreso"&&semKey(m.fecha)===sem&&["Plumas","Mendovet"].includes(m.cliente);}).reduce(function(s,m){return s+m.monto;},0);
    var gasSem=gastos.filter(function(g){return semKey(g.fecha)===sem;}).reduce(function(s,g){return s+g.monto;},0)+suel.filter(function(s){return semKey(s.fecha)===sem;}).reduce(function(s,x){return s+x.monto;},0);
    var resSem=ingSem-gasSem;
    var pendientes=movs.filter(function(m){return m.estado==="pendiente"&&["Plumas","Mendovet"].includes(m.cliente);});
    if(pendientes.length>0){var a=el("div","alert","",{style:{background:"#f59e0b18",border:"1px solid #f59e0b55"}});a.innerHTML="<strong style='color:#f59e0b'>⏳ "+pendientes.length+" cobro(s) pendiente(s)</strong> <span style='color:#9ca3af'>"+$p(pendientes.reduce(function(s,m){return s+m.monto;},0))+" por cobrar</span>";main.appendChild(a);}

    var g4=el("div","g4 mb");
    [[totalIng,"Cobrado "+mesLabel(mesSel),"#22c55e"],[totalGas,"Gastos "+mesLabel(mesSel),"#ef4444"],[resultado,"Resultado",resultado>=0?"#22c55e":"#ef4444"],[resSem,"Esta semana",resSem>=0?"#6c72ff":"#ef4444"]].forEach(function(x){g4.appendChild(statCard($p(x[0]),x[1],x[2]));});
    main.appendChild(g4);

    var g2=el("div","g2");
    var c1=el("div","card");
    c1.appendChild(el("div","","Ingresos por cliente — "+mesLabel(mesSel),{style:{fontSize:"11px",fontWeight:"600",color:"#6b7280",textTransform:"uppercase",marginBottom:"12px"}}));
    ["Plumas","Mendovet"].forEach(function(cl){var t=ingMes.filter(function(m){return m.cliente===cl;}).reduce(function(s,m){return s+m.monto;},0);c1.appendChild(rowEl(cl,$p(t),t>0?CC[cl]:"#6b7280"));});
    c1.appendChild(rowEl(el("span","","Total",{style:{fontWeight:"700"}}),$p(totalIng),"#22c55e"));
    g2.appendChild(c1);

    var c2=el("div","card");
    c2.appendChild(el("div","","Resumen del mes",{style:{fontSize:"11px",fontWeight:"600",color:"#6b7280",textTransform:"uppercase",marginBottom:"12px"}}));
    c2.appendChild(rowEl("Ingresos",$p(totalIng),"#22c55e"));
    c2.appendChild(rowEl("Gastos",$p(totalGas),"#ef4444"));
    c2.appendChild(rowEl("Resultado",$p(resultado),resultado>=0?"#22c55e":"#ef4444"));
    c2.appendChild(rowEl("Sueldo Lucas llevado",$p(lucasLlevo),"#6c72ff"));
    c2.appendChild(rowEl("Sueldo César llevado",$p(Math.min(cesarLlevo,1500000)),"#a78bfa"));
    var quedaRow=rowEl(el("span","","Queda en empresa",{style:{fontWeight:"700"}}),$p(quedaEmpresa),quedaEmpresa>=0?"#22c55e":"#ef4444");
    c2.appendChild(quedaRow);
    g2.appendChild(c2);
    main.appendChild(g2);

    var ultimos=[].concat(movs).filter(function(m){return["Plumas","Mendovet"].includes(m.cliente);}).sort(function(a,b){return b.fecha.localeCompare(a.fecha);}).slice(0,5);
    if(ultimos.length>0){
      var cu=el("div","card");cu.appendChild(el("div","","Últimos movimientos",{style:{fontSize:"11px",fontWeight:"600",color:"#6b7280",textTransform:"uppercase",marginBottom:"10px"}}));
      ultimos.forEach(function(m){

        var clienteKms=[];
        // Get all selects after index 1 (camioneta=0, chofer=1)
        var allSels=[].slice.call(box.querySelectorAll("select"));
        var allInps=[].slice.call(box.querySelectorAll("input[type=number]"));
        // selects[2+] are cliente selects
        for(var i=2;i<allSels.length;i++){clienteSelects.push(allSels[i].value);}
        for(var j=0;j<allInps.length;j++){clienteKms.push(parseFloat(allInps[j].value||0));}
        var entradas=clienteSelects.map(function(cli,idx){return{cliente:cli,km:clienteKms[idx]||0};}).filter(function(e){return e.km>0;});
        if(entradas.length===0)return Promise.resolve();
        return addDoc2("viajes",{fecha:fecha,camioneta:camioneta,chofer:chofer,entradas:entradas,obs:obs}).then(function(){close();setTimeout(build,500);});
      },"#6c72ff");
    }));
    main.appendChild(hdr);

    // Selector de mes
    var topRow=el("div","",undefined,{style:{display:"flex",gap:"12px",alignItems:"center",marginBottom:"14px"}});
    var mSel=document.createElement("select");mSel.style.cssText="background:#0f1117;border:1px solid #2a2d3e;color:#e8eaf0;padding:7px 10px;border-radius:7px;font-size:12px;width:155px";
    allMes.forEach(function(m){var o=document.createElement("option");o.value=m;o.textContent=mesLabel(m);if(m===mesSel)o.selected=true;mSel.appendChild(o);});
    mSel.addEventListener("change",function(e){mesSel=e.target.value;build();});
    topRow.appendChild(mSel);main.appendChild(topRow);

    var viajesMes=viajes.filter(function(v){return v.fecha&&v.fecha.startsWith(mesSel);});
    var totalKm=viajesMes.reduce(function(s,v){return s+v.entradas.reduce(function(a,e){return a+e.km;},0);},0);

    // Stats: KM por camioneta
    var kmCam={};CAMIONETAS.forEach(function(c){kmCam[c]=0;});
    viajesMes.forEach(function(v){if(kmCam[v.camioneta]!==undefined)kmCam[v.camioneta]+=v.entradas.reduce(function(a,e){return a+e.km;},0);});

    var g3=el("div","g3 mb");
    CAMIONETAS.forEach(function(cam){g3.appendChild(statCard(kmCam[cam].toLocaleString()+" km",cam,"#6c72ff"));});
    main.appendChild(g3);

    // Stats: KM por cliente
    var kmCli={Plumas:0,Mendovet:0,Hojaldre:0,Otro:0};
    viajesMes.forEach(function(v){v.entradas.forEach(function(e){if(kmCli[e.cliente]!==undefined)kmCli[e.cliente]+=e.km;else kmCli["Otro"]+=e.km;});});
    var g4=el("div","g4 mb");
    [["Plumas","#38bdf8"],["Mendovet","#22c55e"],["Hojaldre","#fb923c"],["Otro","#6b7280"]].forEach(function(x){if(kmCli[x[0]]>0)g4.appendChild(statCard(kmCli[x[0]].toLocaleString()+" km",x[0],x[1]));});
    if(totalKm>0){var totCard=statCard(totalKm.toLocaleString()+" km","KM totales del mes","#e8eaf0");g4.appendChild(totCard);}
    main.appendChild(g4);

    // Tabla de viajes
    var card=el("div","card");
    var tbl=document.createElement("table");
    tbl.innerHTML="<thead><tr><th>Fecha</th><th>Chofer</th><th>Camioneta</th><th>Clientes y KM</th><th>Obs</th><th></th></tr></thead>";
    var tbody=document.createElement("tbody");
    [].concat(viajesMes).sort(function(a,b){return b.fecha.localeCompare(a.fecha);}).forEach(function(v){
      var tr=document.createElement("tr");
      var choferNombre={lucas:"Lucas",cesar:"César",leo:"Leo"}[v.chofer]||v.chofer;
      var tdF=document.createElement("td");tdF.textContent=v.fecha;
      var tdCh=document.createElement("td");tdCh.textContent=choferNombre;tdCh.style.fontWeight="600";
      var tdCam=document.createElement("td");tdCam.appendChild(tag(v.camioneta,"#6c72ff"));
      var tdEnt=document.createElement("td");
      v.entradas.forEach(function(e){
        var span=el("span","",undefined,{style:{display:"inline-flex",alignItems:"center",gap:"4px",marginRight:"8px"}});
        span.appendChild(tag(e.cliente,CC[e.cliente]||"#6b7280"));span.appendChild(document.createTextNode(" "+e.km+" km"));
        tdEnt.appendChild(span);
      });
      var tdOb=document.createElement("td");tdOb.textContent=v.obs||"—";tdOb.style.color="#6b7280";tdOb.style.fontSize="11px";
      var tdAcc=document.createElement("td");tdAcc.appendChild(btnSm("✕","#ef4444",function(){if(!confirm("¿Seguro que querés eliminar este registro?"))return;delDoc("viajes",v._id).then(build);}));
      [tdF,tdCh,tdCam,tdEnt,tdOb,tdAcc].forEach(function(td){tr.appendChild(td);});
      tbody.appendChild(tr);
    });
    if(viajesMes.length===0){var tr=document.createElement("tr");var td=document.createElement("td");td.colSpan=6;td.style.cssText="text-align:center;padding:24px;color:#6b7280";td.textContent="Sin viajes registrados este mes.";tr.appendChild(td);tbody.appendChild(tr);}
    tbl.appendChild(tbody);card.appendChild(tbl);main.appendChild(card);
  }
  build();
}

// ── INIT ──────────────────────────────────────────────────────────────
window.addEventListener("dbReady",function(){
  REQUIRED.forEach(function(col){initCol(col);});
});
</script>
</body>
